<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Repetitorium">
<title>Repetitorium Lernplan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0f0e0c;--surface:#1a1916;--surface2:#232220;--border:#2e2c29;
    --text:#e8e4dc;--text-muted:#7a7570;--text-dim:#4a4845;
    --accent:#c8a96e;--accent-dim:#8a7045;
    --zr1:#3a6186;--zr1-l:#1a3a5c;--straf:#8b2020;--straf-l:#4a1010;
    --oer:#1e5c3a;--oer-l:#0f3020;--zr2:#5a2080;--zr2-l:#301040;
    --done:#2a7a4a;--done-l:#153d25;--pending:#7a6020;--pending-l:#3d3010;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}
  header{padding:32px 20px 16px;border-bottom:1px solid var(--border);background:var(--surface);}
  header h1{font-family:'Playfair Display',serif;font-size:20px;color:var(--accent);margin-bottom:3px;}
  header p{font-size:11px;color:var(--text-muted);font-weight:300;}
  .progress-wrap{padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
  .progress-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:2px;transition:width .6s ease;}
  .progress-label{font-size:11px;color:var(--text-muted);white-space:nowrap;font-weight:500;}
  .filter-bar{display:flex;gap:6px;padding:10px 20px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;}
  .filter-bar::-webkit-scrollbar{display:none;}
  .filter-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;}
  .filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:600;}
  .week-header{padding:7px 20px;font-size:10px;font-weight:600;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border);}
  .block-card{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--surface);transition:background .15s;}
  .block-card:hover{background:var(--surface2);}
  .block-color-bar{width:3px;flex-shrink:0;}
  .block-main{flex:1;padding:11px 13px;min-width:0;}
  .block-meta{display:flex;align-items:center;gap:7px;margin-bottom:3px;}
  .block-date{font-size:11px;color:var(--text-muted);font-weight:500;}
  .block-tag{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;}
  .tag-zr1{background:var(--zr1-l);color:#7ab0d8;}
  .tag-straf{background:var(--straf-l);color:#d87a7a;}
  .tag-oer{background:var(--oer-l);color:#7ad8a0;}
  .tag-zr2{background:var(--zr2-l);color:#b87ad8;}
  .block-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .block-sub{font-size:11px;color:var(--text-muted);font-weight:300;}
  .rep-dots{display:flex;gap:4px;padding:11px 13px 11px 0;align-items:center;flex-shrink:0;}
  .rep-dot{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:var(--text-dim);cursor:pointer;transition:all .2s;flex-direction:column;line-height:1.1;}
  .rep-dot:hover:not(.done):not(.locked){border-color:var(--accent);color:var(--accent);transform:scale(1.12);}
  .rep-dot.done{background:var(--done-l);border-color:var(--done);color:#7ad8a0;}
  .rep-dot.locked{opacity:.22;cursor:default;}
  .rep-dot.next{border-color:var(--accent-dim);color:var(--accent);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(200,169,110,0);}50%{box-shadow:0 0 0 4px rgba(200,169,110,.15);}}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:100;align-items:flex-end;justify-content:center;}
  .modal-bg.open{display:flex;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px 44px;width:100%;max-width:540px;border-top:1px solid var(--border);animation:slideUp .25s ease;}
  @keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
  .modal-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);margin-bottom:3px;}
  .modal-sub{font-size:12px;color:var(--text-muted);margin-bottom:16px;font-weight:300;}
  .modal-chips{display:flex;gap:7px;margin-bottom:16px;flex-wrap:wrap;}
  .chip{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.03em;}
  .chip.done-chip{background:var(--done-l);color:#7ad8a0;border:1px solid var(--done);}
  .chip.next-chip{background:var(--pending-l);color:var(--accent);border:1px solid var(--pending);}
  .modal-info{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:18px;font-size:12px;color:var(--text-muted);line-height:1.7;}
  .modal-info strong{color:var(--text);font-weight:500;}
  .cal-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s;margin-bottom:9px;}
  .cal-btn:hover{opacity:.88;}
  .cal-btn.secondary{background:transparent;border:1px solid var(--border);color:var(--text-muted);font-weight:400;}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;z-index:200;transition:transform .3s ease;white-space:nowrap;max-width:90vw;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  .empty-state{padding:48px 20px;text-align:center;color:var(--text-dim);font-size:13px;line-height:2;}
</style>
</head>
<body>
<header>
  <h1>Repetitorium Lernplan</h1>
  <p>Alpmann Schmidt &nbsp;·&nbsp; 16 Wochen &nbsp;·&nbsp; Spaced Repetition</p>
</header>
<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 64 abgeschlossen</div>
</div>
<div class="filter-bar">
  <button class="filter-btn active" onclick="setFilter('all',this)">Alle</button>
  <button class="filter-btn" onclick="setFilter('pending',this)">Offen</button>
  <button class="filter-btn" onclick="setFilter('active',this)">Aktiv</button>
  <button class="filter-btn" onclick="setFilter('done',this)">Fertig</button>
  <button class="filter-btn" onclick="setFilter('ZR1',this)">Zivilrecht I</button>
  <button class="filter-btn" onclick="setFilter('STRAF',this)">Strafrecht</button>
  <button class="filter-btn" onclick="setFilter('OER',this)">Oeffentl. R</button>
  <button class="filter-btn" onclick="setFilter('ZR2',this)">Zivilrecht II</button>
</div>
<div id="listContainer"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="mTitle"></div>
    <div class="modal-sub" id="mSub"></div>
    <div class="modal-chips" id="mChips"></div>
    <div class="modal-info" id="mInfo"></div>
    <button class="cal-btn" id="mCalBtn" onclick="confirmDone()"></button>
    <button class="cal-btn secondary" onclick="closeModalDirect()">Abbrechen</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const REP_DAYS  = [0,2,4,7,16];
const REP_NAMES = ['Tag 1 (Lerntag)','Tag 3 (+2)','Tag 7 (+4)','Tag 14 (+7)','Tag 30 (+16)'];
const REP_SHORT = ['T1','T3','T7','T14','T30'];
const RG_LABELS = {ZR1:'Zivilrecht I',STRAF:'Strafrecht',OER:'Oeffentl. Recht',ZR2:'Zivilrecht II'};

const RG_COLOR  = {ZR1:'#3a6186',STRAF:'#8b2020',OER:'#1e5c3a',ZR2:'#5a2080'};

  {id:34,date:"2026-06-18",w:9,rg:"STRAF",thema:"Vermoegensdelikte",faelle:"Faelle 5-7"},
  {id:35,date:"2026-06-19",w:9,rg:"OER",thema:"Baurecht",faelle:"Faelle 1-4"},

  {id:37,date:"2026-06-22",w:10,rg:"ZR1",thema:"SchuldR BT",faelle:"Faelle 5-6"},
  {id:38,date:"2026-06-23",w:10,rg:"STRAF",thema:"Vermoegensdelikte",faelle:"Faelle 8-10"},
  {id:39,date:"2026-06-24",w:10,rg:"OER",thema:"Baurecht",faelle:"Faelle 5-8"},
  {id:40,date:"2026-06-25",w:10,rg:"ZR2",thema:"ZPO I",faelle:"Faelle 1-4"},

  {id:49,date:"2026-07-06",w:13,rg:"ZR1",thema:"SchuldR BT",faelle:"Faelle Rest"},
  {id:50,date:"2026-07-07",w:13,rg:"STRAF",thema:"Urkundsdelikte",faelle:"Gesamtes Thema"},
  {id:51,date:"2026-07-08",w:13,rg:"OER",thema:"VerfR/GR",faelle:"Faelle 3-5"},
  {id:52,date:"2026-07-09",w:13,rg:"ZR2",thema:"ZPO II",faelle:"Rest"},
  {id:53,date:"2026-07-10",w:14,rg:"ZR1",thema:"SachenR",faelle:"Faelle 1-4"},
  {id:54,date:"2026-07-11",w:14,rg:"STRAF",thema:"Gemeingef. Delikte",faelle:"Gesamtes Thema"},
  {id:55,date:"2026-07-13",w:14,rg:"OER",thema:"VerfR/GR",faelle:"Faelle 6-7"},
  {id:56,date:"2026-07-14",w:14,rg:"ZR2",thema:"GOA / Regress",faelle:"Gesamtes Thema"},
  {id:57,date:"2026-07-15",w:15,rg:"ZR1",thema:"SachenR",faelle:"Faelle 5-7"},
  {id:58,date:"2026-07-16",w:15,rg:"STRAF",thema:"StPO",faelle:"Gesamtes Thema"},
  {id:59,date:"2026-07-17",w:15,rg:"OER",thema:"VerfR/GR",faelle:"Faelle 8-9"},
  {id:60,date:"2026-07-18",w:15,rg:"ZR2",thema:"Bereicherungsrecht",faelle:"Faelle 1-3"},
  {id:61,date:"2026-07-20",w:16,rg:"ZR1",thema:"SachenR",faelle:"Faelle Rest"},
  {id:62,date:"2026-07-21",w:16,rg:"STRAF",thema:"EuropaR / IPR",faelle:"Gesamtes Thema"},
  {id:63,date:"2026-07-22",w:16,rg:"OER",thema:"VerfR/GR",faelle:"Aktuelles"},
  {id:64,date:"2026-07-23",w:16,rg:"ZR2",thema:"Bereicherungsrecht",faelle:"Faelle 4-5"},
];

let state = {};
let currentFilter = 'all';
let modalCtx = null;

function loadState(){ try{ state=JSON.parse(localStorage.getItem('repState')||'{}'); }catch(e){ state={}; } }
function saveState(){ localStorage.setItem('repState',JSON.stringify(state)); }
function getBlock(id){ return state[id]||{repDone:[false,false,false,false,false],repDates:[null,null,null,null,null]}; }
function getNextRep(id){ const s=getBlock(id); for(let i=0;i<5;i++) if(!s.repDone[i]) return i; return -1; }
function getStatus(b){ const s=getBlock(b.id); if(s.repDone[4]) return 'done'; if(s.repDone.some(Boolean)) return 'active'; return 'pending'; }

function addDays(dateStr,days){ const d=new Date(dateStr); d.setDate(d.getDate()+days); return d; }
function fmtShort(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
function fmtFull(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function toICS(d){ const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}T090000`; }

function render(){
  const filtered = BLOCKS.filter(b=>{
    const st=getStatus(b);
    if(currentFilter==='all') return true;
    if(currentFilter==='pending') return st==='pending';
    if(currentFilter==='active') return st==='active';
    if(currentFilter==='done') return st==='done';
    return b.rg===currentFilter;
  });
  const container=document.getElementById('listContainer');
  if(!filtered.length){ container.innerHTML='<div class="empty-state">Keine Eintraege gefunden.</div>'; updateProgress(); return; }
  const weeks={};
  filtered.forEach(b=>{ if(!weeks[b.w]) weeks[b.w]=[]; weeks[b.w].push(b); });
  let html='';
  Object.keys(weeks).sort((a,b)=>a-b).forEach(w=>{
    html+=`<div class="week-header">Lernwoche ${w}</div>`;
    weeks[w].forEach(b=>{ html+=renderBlock(b); });
  });
  container.innerHTML=html;
  updateProgress();
}

function renderBlock(b){
  const s=getBlock(b.id);
  const next=getNextRep(b.id);
  const dateStr=fmtShort(new Date(b.date));
  let dots='';
  for(let i=0;i<5;i++){
    let cls='';
    if(s.repDone[i]) cls='done';
    else if(i===next) cls='next';
    else cls='locked';
    const lbl=s.repDone[i]&&s.repDates[i] ? '&#10003;' : REP_SHORT[i];
    dots+=`<div class="rep-dot ${cls}" onclick="dotClick(${b.id},${i})"><span style="font-size:8px">${lbl}</span></div>`;
  }
  return `<div class="block-card" id="card-${b.id}">
    <div class="block-color-bar" style="background:${RG_COLOR[b.rg]}"></div>
    <div class="block-main">
      <div class="block-meta">
        <span class="block-date">${dateStr}</span>
        <span class="block-tag ${RG_TAG[b.rg]}">${RG_LABELS[b.rg]}</span>
      </div>
      <div class="block-title">${b.thema}</div>
      <div class="block-sub">${b.faelle}</div>
    </div>
    <div class="rep-dots">${dots}</div>
  </div>`;
}

function updateProgress(){
  let done=0;
  BLOCKS.forEach(b=>{ if(getBlock(b.id).repDone[4]) done++; });
  const pct=Math.round(done/BLOCKS.length*100);
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=`${done} / ${BLOCKS.length} abgeschlossen`;
}

function dotClick(blockId,repIdx){
  const next=getNextRep(blockId);
  if(repIdx!==next) return;
  const block=BLOCKS.find(b=>b.id===blockId);
  const s=getBlock(blockId);
  modalCtx={blockId,repIdx,block};
  document.getElementById('mTitle').textContent=block.thema;
  document.getElementById('mSub').textContent=`${RG_LABELS[block.rg]}  ·  ${block.faelle}  ·  Woche ${block.w}`;
  let chips='';
  for(let i=0;i<5;i++){
    if(s.repDone[i]&&s.repDates[i]) chips+=`<div class="chip done-chip">${REP_SHORT[i]} erledigt ${fmtShort(new Date(s.repDates[i]))}</div>`;
    else if(i===repIdx) chips+=`<div class="chip next-chip">${REP_NAMES[repIdx]} – jetzt</div>`;
  }
  document.getElementById('mChips').innerHTML=chips;
  const nextIdx=repIdx+1;
  const nextDate=nextIdx<5 ? addDays(block.date,REP_DAYS[nextIdx]) : null;
  let info=`<strong>${REP_NAMES[repIdx]}</strong> fuer <strong>${block.thema}</strong> als erledigt markieren?`;
  if(nextDate) info+=`<br><br>Die naechste Wiederholung (<strong>${REP_NAMES[nextIdx]}</strong>) wird am <strong>${fmtFull(nextDate)}</strong> in deinen Kalender eingetragen.`;
  else info+='<br><br>Das ist die letzte Wiederholung – Block wird als abgeschlossen markiert!';
  document.getElementById('mInfo').innerHTML=info;
  document.getElementById('mCalBtn').textContent=nextDate ? `Erledigt + ${REP_NAMES[nextIdx]} in Kalender` : 'Erledigt – Block abschliessen';
  document.getElementById('modalBg').classList.add('open');
}

function confirmDone(){
  const {blockId,repIdx,block}=modalCtx;
  if(!state[blockId]) state[blockId]={repDone:[false,false,false,false,false],repDates:[null,null,null,null,null]};
  state[blockId].repDone[repIdx]=true;
  state[blockId].repDates[repIdx]=new Date().toISOString();
  saveState();
  const nextIdx=repIdx+1;
  if(nextIdx<5){
    const nextDate=addDays(block.date,REP_DAYS[nextIdx]);
    const title=encodeURIComponent(`Wiederholung ${REP_NAMES[nextIdx]}: ${block.thema} (${block.faelle})`);
    const desc=encodeURIComponent(`Spaced Repetition – ${REP_NAMES[nextIdx]} fuer ${block.thema}`);
    const start=toICS(nextDate);
    const end=toICS(new Date(nextDate.getTime()+60*60*1000));
    const ics=`BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//RepLernplan//DE\nBEGIN:VEVENT\nUID:rep-${blockId}-${nextIdx}@lernplan\nDTSTART:${start}\nDTEND:${end}\nSUMMARY:${decodeURIComponent(title)}\nDESCRIPTION:${decodeURIComponent(desc)}\nEND:VEVENT\nEND:VCALENDAR`;
    const blob=new Blob([ics],{type:'text/calendar'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`rep-${blockId}-${nextIdx}.ics`; a.click();
    URL.revokeObjectURL(url);
    showToast(`Kalender-Eintrag fuer ${REP_NAMES[nextIdx]} erstellt`);
  } else {
    showToast('Block vollstaendig abgeschlossen!');
  }
  closeModalDirect();
  render();
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function closeModal(e){ if(e.target===document.getElementById('modalBg')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalBg').classList.remove('open'); modalCtx=null; }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

loadState();
render();
</script>
</body>
</html>
